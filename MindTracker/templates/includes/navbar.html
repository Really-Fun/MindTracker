<nav class="navbar">
    <div class="nav-container">
        <a href={% url 'home' %} class="nav-logo">
            <span class="logo-icon">🧠</span> MindTracker
        </a>
        
        <ul class="nav-links">
            <li><a href="#app">Приложение</a></li>
            <li><a href={% url 'profile:stats' %}>Статистика</a></li>
            <li><a href="#community">Комьюнити</a></li>
        </ul>
        
        <div class="nav-actions">
            {% if user.is_authenticated %}
                <span class="greeting">Привет, {{ user.username }}!</span>
                <a href="{% url 'profile:stats' %}" class="nav-login">Мой трекер</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-sm btn-logout">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-login">Войти</a>
                <a href="{% url 'register' %}" class="btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>
