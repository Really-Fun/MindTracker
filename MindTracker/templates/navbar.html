{% load static %}
<nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'home' %}" class="nav-logo">
            <span class="logo-icon">🧠</span> MindTracker
        </a>
        
        <ul class="nav-links">
            <li><a href="#features">Фичи</a></li>
            <li><a href="#stats">Статистика</a></li>
            <li><a href="#community">Комьюнити</a></li>
        </ul>
        
        <div class="nav-actions">
            {% if user.is_authenticated %}
                <span style="color: var(--text-secondary); margin-right: 15px;">Привет, {{ user.username }}!</span>
                <a href="{% url 'stats' %}" class="nav-login">Мой трекер</a>
                
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-sm" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;">Выйти</button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="nav-login">Войти</a>
                <a href="{% url 'register' %}" class="btn-sm" style="text-decoration: none; display: inline-block; line-height: normal;">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>
