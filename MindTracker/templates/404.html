<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Страница не найдена</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .text-glow { 
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.5); 
        }
        .hero-glow { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 50vw; 
            height: 50vh; 
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 60%); 
            z-index: -1; 
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-6">
    <div class="hero-glow"></div>

    <main class="glass p-10 md:p-16 rounded-3xl text-center max-w-2xl w-full shadow-2xl relative z-10 transform transition-all hover:scale-[1.01]">
        <h1 class="text-8xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-purple-600 mb-6 text-glow tracking-tighter">
            404
        </h1>
        
        <h2 class="text-2xl md:text-3xl font-extrabold mb-4 text-white tracking-tight">
            Похоже, ты забрел не в ту ветку
        </h2>
        
        <p class="text-slate-400 mb-10 text-lg leading-relaxed">
            Даже двойная доза магния и идеальный стрик логов не помогут найти этот URL. Страница выгорела, удалена или её никогда не существовало.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'home' %}" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold rounded-2xl transition-all shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:-translate-y-1">
                Вернуться на базу
            </a>
            <button onclick="history.back()" class="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-2xl border border-slate-700 transition-all hover:-translate-y-1">
                Шаг назад
            </button>
        </div>
    </main>
</body>
</html>
