<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация | Mind Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f10; /* Глубокий черный */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .register-card {
            background-color: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h2 { color: #007bff; font-weight: 700; letter-spacing: -0.5px; }
        .form-label { color: #a1a1a6; font-size: 0.9rem; margin-bottom: 0.4rem; }
        
        /* Стилизация инпутов под твой кастомный класс .form-input */
        .form-input, .form-control, input[type="file"] {
            background-color: #2c2c2e !important;
            border: 1px solid #3a3a3c !important;
            color: #ffffff !important;
            border-radius: 6px;
        }
        .form-input:focus, .form-control:focus {
            border-color: #007bff !important;
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25) !important;
            outline: none;
        }
        .btn-register {
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            font-weight: 600;
            padding: 12px;
            transition: transform 0.2s;
        }
        .btn-register:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .errorlist { color: #ff453a; font-size: 0.8rem; list-style: none; padding: 0; margin-top: 5px; }
        
        /* Превью аватарки */
        #avatar-preview {
            width: 80px; height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #007bff;
            display: none;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card">
                <h2 class="text-center mb-4">Создать аккаунт</h2>
                
                <form method="post" enctype="multipart/form-data" id="reg-form">
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}

                    <div class="text-center">
                        <img id="avatar-preview" src="#" alt="Preview">
                    </div>

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="errorlist">{{ field.errors }}</div>
                            {% endif %}
                            {% if field.help_text %}
                                <div class="form-text text-muted" style="font-size: 0.7rem;">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-register">Зарегистрироваться</button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <span class="text-muted small">Уже есть аккаунт?</span>
                    <a href="{% url 'login' %}" class="text-decoration-none small" style="color: #007bff;"> Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>



<script>
    // Хак для Bootstrap классов, если Django их не прокинул
    document.querySelectorAll('input, select, textarea').forEach(el => {
        if(!el.classList.contains('form-input')) {
            el.classList.add('form-control');
        }
    });

    // Предпросмотр аватарки
    const avatarInput = document.querySelector('input[type="file"]');
    const preview = document.getElementById('avatar-preview');

    if (avatarInput) {
        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            }
        });
    }
</script>

</body>
</html>
