<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация | Mind Tracker</title>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card">
                <h2 class="text-center mb-4">Создать аккаунт</h2>
                
                <form method="post" enctype="multipart/form-data" id="reg-form">
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}

                    <div class="text-center">
                        <img id="avatar-preview" src="#" alt="Preview">
                    </div>

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="errorlist">{{ field.errors }}</div>
                            {% endif %}
                            {% if field.help_text %}
                                <div class="form-text text-muted" style="font-size: 0.7rem;">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-register">Зарегистрироваться</button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <span class="text-muted small">Уже есть аккаунт?</span>
                    <a href="{% url 'login' %}" class="text-decoration-none small" style="color: #007bff;"> Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>



<script>
    // Хак для Bootstrap классов, если Django их не прокинул
    document.querySelectorAll('input, select, textarea').forEach(el => {
        if(!el.classList.contains('form-input')) {
            el.classList.add('form-control');
        }
    });

    // Предпросмотр аватарки
    const avatarInput = document.querySelector('input[type="file"]');
    const preview = document.getElementById('avatar-preview');

    if (avatarInput) {
        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            }
        });
    }
</script>

</body>
</html>
