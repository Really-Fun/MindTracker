<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind & Muscle | Check-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Daily Check-up</h1>
            <p class="text-slate-400">Сегодня: {{ date|date:"d E Y" }}</p>
        </header>

        <form method="POST" class="card rounded-2xl p-6 shadow-xl space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium mb-2">Настроение (1-10)</label>
                <input type="range" name="mood" min="1" max="10" value="5" 
                       class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <div class="flex justify-between text-xs text-slate-500 mt-2 italic">
                    <span>Тильт</span>
                    <span>Норм</span>
                    <span>Заряжен</span>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 rounded-xl bg-slate-800/50 border border-slate-700">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">💊</span>
                    <span class="font-medium">Магний принят?</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="took_magnesium" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 uppercase tracking-wider text-slate-500">Заметки по спине / состоянию</label>
                <textarea name="notes" rows="3" 
                          placeholder="Как плечо? Что по тренировке? Мысли..."
                          class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600"></textarea>
            </div>

            <button type="submit" 
                    class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
                Закоммитить день
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="#" class="text-sm text-slate-500 hover:text-blue-400 transition-colors">← К списку логов</a>
        </div>
    </div>
</body>
</html>
